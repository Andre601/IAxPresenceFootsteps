name: Create Jar for release

on:
  release:
    types:
    - published
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build Jar file
      run: mvn clean package
    - name: Upload Jar
      uses: AButler/upload-release-assets@v4
      with:
        files: 'target/IAxPresenceFootsteps-*.jar'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
